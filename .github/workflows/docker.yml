name: Docker

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: |
            ghcr.io/mjarberg88/benchmarker:${{ github.sha }}
            ghcr.io/mjarberg88/benchmarker:latest